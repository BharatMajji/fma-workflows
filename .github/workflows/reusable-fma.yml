name: FMA Generate (reusable)

on:
  workflow_call:
    inputs:
      fma_id:
        description: 'FMA ID from backend (correlation key)'
        required: true
        type: string
      service_name:
        description: 'Service name (default component tag)'
        required: true
        type: string
      service_description:
        description: 'Short text describing what the service does'
        required: false
        type: string
        default: ''
      mermaid_diagram:
        description: 'Architecture diagram (mermaid text)'
        required: false
        type: string
        default: ''
      dedupe_context_json:
        description: 'JSON: { existingFindings, activeActionItems }'
        required: false
        type: string
        default: '{}'
      prompt:
        description: 'Full backend prompt (override + schema + reasoning rules)'
        required: true
        type: string
      depth:
        description: 'quick | standard | deep'
        required: false
        type: string
        default: 'standard'
    secrets:
      COPILOT_PAT:
        required: true

jobs:
  generate-findings:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Assemble full prompt
        env:
          BACKEND_PROMPT:      ${{ inputs.prompt }}
          SERVICE_NAME:        ${{ inputs.service_name }}
          SERVICE_DESCRIPTION: ${{ inputs.service_description }}
          MERMAID_DIAGRAM:     ${{ inputs.mermaid_diagram }}
          DEDUPE_JSON:         ${{ inputs.dedupe_context_json }}
          DEPTH:               ${{ inputs.depth }}
          FMA_ID:              ${{ inputs.fma_id }}
        run: |
          mkdir -p fma-output
          {
            echo "FMA ID: $FMA_ID"
            echo "Service: $SERVICE_NAME (depth=$DEPTH)"
            echo
            echo "## Service description"
            echo "$SERVICE_DESCRIPTION"
            echo
            echo "## Architecture (mermaid)"
            echo "$MERMAID_DIAGRAM"
            echo
            echo "## Skip duplicates (existing findings + active action items)"
            echo "$DEDUPE_JSON"
            echo
            echo "## Backend instructions (authoritative)"
            echo "$BACKEND_PROMPT"
          } > /tmp/full-prompt.md
          echo "::group::Assembled prompt size"
          wc -c /tmp/full-prompt.md
          echo "::endgroup::"

      - name: Run fma-identify skill
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          copilot /fma-identify "$(cat /tmp/full-prompt.md)"

      - name: Verify findings.json exists
        run: |
          if [ ! -s fma-output/findings.json ]; then
            echo "::error::findings.json missing or empty — model may have written markdown instead. Check docs/fma/current/ in run logs."
            ls -la docs/fma/current/ 2>/dev/null || true
            exit 1
          fi
          echo "::group::findings.json preview"
          head -c 2000 fma-output/findings.json
          echo "::endgroup::"

      - name: Upload findings.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: fma-findings
          path: fma-output/findings.json
          if-no-files-found: error
          retention-days: 7
