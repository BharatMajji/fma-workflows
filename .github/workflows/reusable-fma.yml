name: FMA Generate (reusable)

on:
  workflow_call:
    inputs:
      fma_id:
        description: 'FMA ID from backend (correlation key)'
        required: true
        type: string
      service_name:
        description: 'Service name (default component tag)'
        required: true
        type: string
      service_description:
        description: 'Short text describing what the service does'
        required: false
        type: string
        default: ''
      mermaid_diagram:
        description: 'Architecture diagram (mermaid text; backend converts uploaded images to mermaid first)'
        required: false
        type: string
        default: ''
      dedupe_context_json:
        description: 'JSON: { existingFindings, activeActionItems }'
        required: false
        type: string
        default: '{}'
      prompt:
        description: 'Full backend prompt (override + schema + reasoning rules)'
        required: true
        type: string
      depth:
        description: 'quick | standard | deep'
        required: false
        type: string
        default: 'standard'
    secrets:
      COPILOT_PAT:
        required: true

permissions:
  contents: read

jobs:
  generate-findings:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Assemble full prompt
        env:
          BACKEND_PROMPT:      ${{ inputs.prompt }}
          SERVICE_NAME:        ${{ inputs.service_name }}
          SERVICE_DESCRIPTION: ${{ inputs.service_description }}
          MERMAID_DIAGRAM:     ${{ inputs.mermaid_diagram }}
          DEDUPE_JSON:         ${{ inputs.dedupe_context_json }}
          DEPTH:               ${{ inputs.depth }}
          FMA_ID:              ${{ inputs.fma_id }}
        run: |
          mkdir -p fma-output
          {
            echo "FMA ID: $FMA_ID"
            echo "Service: $SERVICE_NAME (depth=$DEPTH)"
            echo
            echo "## Service description"
            echo "$SERVICE_DESCRIPTION"
            echo
            echo "## Architecture (mermaid)"
            echo "$MERMAID_DIAGRAM"
            echo
            echo "## Skip duplicates (existing findings + active action items)"
            echo "$DEDUPE_JSON"
            echo
            echo "## Backend instructions (authoritative)"
            echo "$BACKEND_PROMPT"
            echo
            echo "## Execution override (MANDATORY - takes precedence over the skill's own steps)"
            echo "Run the fma-identify skill in .claude/skills/fma-identify/SKILL.md to"
            echo "DISCOVER failure modes only: read docs/fma/current/component-mapping.yaml,"
            echo "scan the mapped source files, analyse the failure modes, and assign"
            echo "impact / likelihood / priority."
            echo "Then APPLY these overrides - they WIN over anything in the skill:"
            echo "  - Do NOT write any Markdown (nothing under docs/fma/current/*.md)."
            echo "  - Do NOT run generate-excel.py or any other script."
            echo "  - Do NOT print a discovery report."
            echo "  - Do NOT create or modify ANY file except fma-output/findings.json."
            echo "Write ALL findings as ONE strict JSON object {\"findings\":[...]} to"
            echo "fma-output/findings.json, matching the schema in the backend"
            echo "instructions above."
            echo "FIELD TYPES: component, failureMode, detectionStrategy,"
            echo "monitoringScenarios, recoverySteps, recommendation, priority are"
            echo "single STRINGS (not arrays). If you have multiple points, join them"
            echo "with '; ' in one string. impact and likelihood are integers 1-5."
            echo "ARRAYS: affectedFiles (path + signal) AND actionItems (1-3 SHORT"
            echo "one-line plain-language hints, max ~12 words each: WHAT to do, not"
            echo "HOW to code it. NO code, snippets, config syntax, parameter names or"
            echo "file paths in actionItems - e.g. 'Add a connection timeout so it fails"
            echo "fast', NOT 'Set socket.connectTimeout=5000ms')."
            echo "Output nothing else. Ask no questions."
          } > /tmp/full-prompt.md
          echo "::group::Assembled prompt size"
          wc -c /tmp/full-prompt.md
          echo "::endgroup::"

      - name: Run fma-identify skill
        env:
          # The Copilot CLI authenticates with this token. COPILOT_GITHUB_TOKEN is
          # the variable the CLI actually reads (matches the FMA backend's
          # copilotRunner). GITHUB_TOKEN is kept for any gh-based calls.
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          GITHUB_TOKEN:         ${{ secrets.COPILOT_PAT }}
        run: |
          set -o pipefail
          # Non-interactive flags are REQUIRED so the run never blocks on an
          # approval prompt and the skill is allowed to WRITE fma-output/findings.json.
          copilot -p "$(cat /tmp/full-prompt.md)" \
            --no-ask-user \
            --allow-all-paths \
            -s \
            --no-color \
            --allow-tool read \
            --allow-tool write \
            --allow-tool shell \
            2>&1 | tee /tmp/copilot-output.log

      - name: Verify findings.json exists
        run: |
          if [ ! -s fma-output/findings.json ]; then
            echo "::error::findings.json missing or empty - model may have written markdown instead. See copilot log artifact."
            tail -n 80 /tmp/copilot-output.log 2>/dev/null || true
            exit 1
          fi
          echo "::group::findings.json preview"
          head -c 2000 fma-output/findings.json
          echo "::endgroup::"

      - name: Upload findings.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: fma-findings
          path: fma-output/findings.json
          if-no-files-found: error
          retention-days: 7

      - name: Upload copilot log (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: copilot-log
          path: /tmp/copilot-output.log
          if-no-files-found: ignore
